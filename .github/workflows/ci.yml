name: FinGuard CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d finguard_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finguard_test
      JWT_SECRET: test_jwt_secret
      JWT_EXPIRES_IN: 7d

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run database migrations
        run: npm run migrate

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test
